version: "3.8"

services:
  zephyr:
    build:
      context: .
      dockerfile: Dockerfile
    image: zephyr-dev:latest
    volumes:
      # Mount your entire project into the container
      - .:/workspace
      # Optional: Cache build artifacts for faster rebuilds
      - build-cache:/workspace/build
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Optional: Pass through USB devices for flashing
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb

volumes:
  build-cache:
